version: 1

domain:
  name: taxi_business_analytics
  description: >
    Analyze taxi company performance, trips, revenue,
    fares, tips, payment methods and synthetic company classifications.

data_availability:

  taxi_trips:
    date_column: trip_start_timestamp
    minimum_date: "2013-01-01"
    maximum_date: "2023-12-31"


tables:

  taxi_trips:

    full_table_name: bigquery-public-data.chicago_taxi_trips.taxi_trips

    table_type: fact

    description: >
      Chicago taxi trip transaction table.
      One row represents one taxi trip.

    primary_key:
      - unique_key

    columns:

      unique_key:
        type: STRING

      company:
        type: STRING

      trip_start_timestamp:
        type: TIMESTAMP

      trip_miles:
        type: FLOAT64

      fare:
        type: FLOAT64

      tips:
        type: FLOAT64

      trip_total:
        type: FLOAT64

      payment_type:
        type: STRING


  company_master:

    full_table_name: test-to-sql-502205.text_to_sql.company_master

    table_type: dimension

    description: >
      Synthetic taxi company business classification table.

    primary_key:
      - company_id

    columns:

      company_id:
        type: INT64

      company_name:
        type: STRING

      company_category:
        type: STRING

      service_type:
        type: STRING


relationships:

  taxi_trips_to_company_master:

    left_table: taxi_trips

    right_table: company_master

    relationship_type: many_to_one

    join_type: INNER JOIN

    join_condition:

      left_column: company

      right_column: company_name


metrics:

  total_revenue:

    description: Total revenue generated by taxi trips.

    sql_expression: SUM(taxi_trips.trip_total)

    source_tables:
      - taxi_trips


  total_trips:

    description: Number of unique taxi trips.

    sql_expression: COUNT(DISTINCT taxi_trips.unique_key)

    source_tables:
      - taxi_trips


  average_fare:

    description: Average taxi fare per trip.

    sql_expression: AVG(taxi_trips.fare)

    source_tables:
      - taxi_trips


  average_trip_distance:

    description: Average distance traveled per trip.

    sql_expression: AVG(taxi_trips.trip_miles)

    source_tables:
      - taxi_trips


  average_tip:

    description: Average tip amount per trip.

    sql_expression: AVG(taxi_trips.tips)

    source_tables:
      - taxi_trips


  tip_percentage:

    description: Percentage of fare revenue received as tips.

    sql_expression: >
      SAFE_MULTIPLY(
        SAFE_DIVIDE(
          SUM(taxi_trips.tips),
          SUM(taxi_trips.fare)
        ),
        100
      )

    source_tables:
      - taxi_trips


dimensions:

  company:

    description: Taxi company name.

    table: taxi_trips

    column: company


  company_category:

    description: Synthetic business category assigned to a taxi company.

    table: company_master

    column: company_category


  service_type:

    description: Synthetic service classification assigned to a taxi company.

    table: company_master

    column: service_type


  payment_type:

    description: Payment method used for the taxi trip.

    table: taxi_trips

    column: payment_type


  trip_start_timestamp:

    description: Timestamp when the trip started.

    table: taxi_trips

    column: trip_start_timestamp